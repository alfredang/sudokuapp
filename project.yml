name: SudokuApp

options:
  bundleIdPrefix: com.tertiaryinfotech
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "GU9WTSTX9M"  # Tertiary Infotech (paid) — same team as RunTrack GPS
    CODE_SIGN_STYLE: Automatic

targets:
  SudokuApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: SudokuApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tertiaryinfotech.sudokuapp
        INFOPLIST_FILE: SudokuApp/Support/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"   # iPhone
        SUPPORTS_MACCATALYST: NO
